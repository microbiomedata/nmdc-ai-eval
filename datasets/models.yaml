# Model configuration for eval suites.
#
# Names must match what `uv run llm models list` shows.
# Native llm plugins: OpenAI (built-in), llm-claude-3 (Anthropic), llm-gemini (Gemini).
# Auth: keys in llm key store (`uv run llm keys set <provider>`) or env vars.
# To add a model, add one line here and run `just generate`.

models:
  - gpt-4o-mini
  - gpt-4o
  - anthropic/claude-sonnet-4-5
  - anthropic/claude-haiku-4-5-20251001
  - gemini/gemini-2.5-flash
