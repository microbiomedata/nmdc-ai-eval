    The rate of decomposition in these cold, anoxic environments is regulated by heterotrophic microbial networks adapted
    to extreme conditions. The enzyme latch hypothesis posits that oxygen limitation suppresses phenol oxidases, allowing
    phenolic compounds to accumulate and inhibit decomposition, but recent evidence suggests these plant-derived compounds
