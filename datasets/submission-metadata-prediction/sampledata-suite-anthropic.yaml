  ideal: metagenome_sequencing_non_interleaved_data
  tags:
  - metagenome_sequencing_non_interleaved_data
  original_input:
    study_name: Effects of warming and drought on the microbial communities of a northern peatland
    sampleData: metagenome_sequencing_non_interleaved_data
