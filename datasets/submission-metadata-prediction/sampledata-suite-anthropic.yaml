name: nmdc-sampledata-prediction-anthropic
description: Predict MIxS environmental package (sampleData) from NMDC submission study name and description (anthropic models).
  Generated from eval_input_target_pairs.tsv.
template: predict_sample_type
templates:
  predict_sample_type:
    system: 'You are an expert in environmental metadata standards (MIxS, NMDC, GOLD).

      Given a study name and description from an NMDC submission, predict the

      MIxS environmental package (sampleData template).


      Valid values: soil_data, water_data, plant_associated_data, misc_envs_data,

      host_associated_data, sediment_data, air_data,

      metagenome_sequencing_non_interleaved_data


      Reply with ONLY the package name, nothing else.'
    prompt: '{input}'
    metrics:
    - simple_question
matrix:
  hyperparameters:
    model:
    - anthropic/claude-sonnet-4-5
    - anthropic/claude-haiku-4-5-20251001
    temperature:
    - 0.0
cases:
- input: 'Study: Effects of warming and drought on the microbial communities of a northern peatland

