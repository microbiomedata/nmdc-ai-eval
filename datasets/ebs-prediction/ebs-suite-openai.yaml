name: nmdc-ebs-prediction-openai
description: Predict env_broad_scale from non-GOLD biosample metadata (openai models). Generated from eval_input_target_pairs.tsv.
  Post-hoc scoring with envo_scorer adds ontology-aware metrics.
template: predict_ebs
templates:
  predict_ebs:
    system: 'You are an expert in environmental ontologies (ENVO) and the MIxS metadata standard.

      Given metadata about an NMDC biosample, predict the env_broad_scale value.


      Your answer MUST be in the exact format: label [CURIE]

      For example: terrestrial biome [ENVO:00000446]


      Use only ENVO terms. Reply with ONLY the env_broad_scale value, nothing else.'
    prompt: '{input}'
    metrics:
    - simple_question
matrix:
  hyperparameters:
    model:
    - gpt-4o-mini
    - gpt-4o
    temperature:
    - 0.0
