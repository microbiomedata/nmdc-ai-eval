name: QC

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check src/ tests/ datasets/
      - name: Format check
        run: uv run ruff format --check src/ tests/ datasets/
      - name: Type check
        run: uv run mypy src/ tests/
      - name: Dependency check
        run: uv run deptry src/
      - name: Security audit
        run: uv run pip-audit --ignore-vuln CVE-2025-69872
      - name: Test
        run: uv run pytest -v
